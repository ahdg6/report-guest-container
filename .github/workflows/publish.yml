name: Publish Guest

on:
  push:
    tags:
      - "[0-9]*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Immutable release tag, for example 2026.07.0
        required: true
        type: string

concurrency:
  group: publish-report-guest
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/ahdg6/report-guest-container
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

jobs:
  build:
    name: Build candidate
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      candidate_tag: ${{ steps.names.outputs.candidate_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate release
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Guest releases must point to a commit contained in main." >&2
            exit 1
          fi
          if ! printf '%s' "$RELEASE_TAG" | grep -Eq '^[A-Za-z0-9][A-Za-z0-9._-]*$'; then
            echo "release_tag may contain only letters, numbers, dot, underscore, and hyphen" >&2
            exit 1
          fi

      - name: Set candidate name
        id: names
        run: echo "candidate_tag=candidate-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push candidate
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.names.outputs.candidate_tag }}
          build-args: |
            GUEST_REVISION=${{ github.sha }}
          cache-from: type=gha,scope=report-guest
          cache-to: type=gha,mode=max,scope=report-guest
          provenance: mode=max
          sbom: true

      - name: Require anonymous GHCR pull access
        env:
          CANDIDATE_TAG: ${{ steps.names.outputs.candidate_tag }}
        run: |
          token=$(curl --fail --silent --show-error \
            "https://ghcr.io/token?service=ghcr.io&scope=repository:ahdg6/report-guest-container:pull" \
            | python3 -c 'import json,sys; print(json.load(sys.stdin)["token"])')
          curl --fail --silent --show-error --head \
            --header "Authorization: Bearer $token" \
            --header "Accept: application/vnd.oci.image.index.v1+json" \
            "https://ghcr.io/v2/ahdg6/report-guest-container/manifests/$CANDIDATE_TAG"

  verify-amd64:
    name: Verify amd64 MicroVM
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Enable KVM access
        run: |
          test -c /dev/kvm
          sudo chmod 0666 /dev/kvm

      - name: Install native runtime dependency
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y libcap-ng0

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify candidate in a real network-disabled MicroVM
        env:
          PLUXEL_GUEST_IMAGE: ${{ env.IMAGE }}:${{ needs.build.outputs.candidate_tag }}@${{ needs.build.outputs.digest }}
        run: pnpm verify

  verify-arm64:
    name: Verify arm64 MicroVM
    needs: build
    runs-on:
      - self-hosted
      - Linux
      - ARM64
      - kvm
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Enable KVM access
        run: |
          test -c /dev/kvm
          sudo chmod 0666 /dev/kvm

      - name: Install native runtime dependency
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y libcap-ng0

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify candidate in a real network-disabled MicroVM
        env:
          PLUXEL_GUEST_IMAGE: ${{ env.IMAGE }}:${{ needs.build.outputs.candidate_tag }}@${{ needs.build.outputs.digest }}
        run: pnpm verify

  promote:
    name: Promote verified digest
    needs:
      - build
      - verify-amd64
      - verify-arm64
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote candidate digest without rebuilding
        env:
          DIGEST: ${{ needs.build.outputs.digest }}
        run: |
          if docker buildx imagetools inspect "$IMAGE:$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release tag already exists and will not be moved: $IMAGE:$RELEASE_TAG" >&2
            exit 1
          fi
          docker buildx imagetools create --tag "$IMAGE:$RELEASE_TAG" "$IMAGE@$DIGEST"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4

      - name: Sign verified digest with GitHub OIDC
        env:
          DIGEST: ${{ needs.build.outputs.digest }}
        run: cosign sign --yes "$IMAGE@$DIGEST"

      - name: Summarize release
        env:
          DIGEST: ${{ needs.build.outputs.digest }}
        run: |
          {
            echo "## Published Pluxel Report Guest"
            echo
            echo "\`$IMAGE:$RELEASE_TAG@$DIGEST\`"
            echo
            echo "Update consumers through a reviewed digest-pinning PR."
          } >> "$GITHUB_STEP_SUMMARY"
