name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck verifier
        run: pnpm typecheck

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build amd64 guest
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: pluxel-report-guest:ci

      - name: Run container-level offline smoke test
        run: |
          mkdir .smoke
          chmod 0777 .smoke
          docker run --rm --network none --user 1000:100 --workdir /workspace \
            --volume "$PWD/.smoke:/workspace" \
            pluxel-report-guest:ci python /opt/pluxel/verify-guest.py
